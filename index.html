<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informática Valinhos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            color: #0056b3;
        }

        header p {
            font-size: 1.2rem;
            color: #555;
        }

        nav {
            max-width: 800px;
            margin: 0 auto 30px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            padding: 0;
        }

        nav li {
            margin: 0;
        }

        nav a {
            display: block;
            padding: 12px 24px;
            text-decoration: none;
            color: #0056b3;
            font-weight: bold;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: #e9ecef;
        }

        #main-content {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-height: 300px;
        }

        section h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 5px;
            color: #0056b3;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #777;
        }

        @media (max-width: 768px) {
            /* Ajustes responsivos mantidos */
        }
    </style>
</head>
<body>
    <header>
        <h1>Informática Valinhos</h1>
        <p>Assistência técnica especializada em acesso remoto</p>
    </header>

    <nav>
        <ul>
            <li><a href="#" data-section="sobre">Sobre</a></li>
            <li><a href="#" data-section="servicos">Serviços</a></li>
            <li><a href="#" data-section="contato">Contato</a></li>
        </ul>
    </nav>

    <div id="main-content"></div>

    <footer>
        <p>&copy; 2026 Informática Valinhos</p>
        <p style="font-size: 0.75rem; margin-top: 5px;">Hospedado no GitHub Pages</p>
    </footer>

    <script>
        const conteudo = {
            sobre: `
                <section id="sobre">
                    <h2>Sobre</h2>
                    <p>A <strong>Informática Valinhos</strong> é uma assistência técnica especializada em acesso remoto, sem endereço físico e sem atendimento presencial. Realizamos todo o suporte através de conexão remota, com agilidade e segurança.</p>
                    <p><strong>Técnico Responsável:</strong> Paulo Fagoto, profissional com experiência em soluções de TI e suporte especializado.</p>
                    <p>O acesso remoto é realizado através do software <strong><a href="https://anydesk.com/en/downloads/windows" target="_blank" rel="noopener noreferrer">AnyDesk</a></strong>.</p>
                    <!-- Demais informações serão inseridas posteriormente -->
                </section>
            `,
            servicos: `
                <section id="servicos">
                    <h2>Serviços</h2>
                    <!-- Conteúdo a ser inserido posteriormente -->
                </section>
            `,
            contato: `
                <section id="contato">
                    <h2>Contato</h2>
                    <p><strong>Técnico Responsável:</strong> Paulo Fagoto</p>
                    <p><strong>E-mail:</strong> contatoinformaticavalinhos@gmail.com</p>
                    <!-- demais informações serão inseridas depois -->
                </section>
            `
        };

        function carregarSecao(secaoId) {
            const mainContent = document.getElementById('main-content');
            if (conteudo[secaoId]) {
                mainContent.innerHTML = conteudo[secaoId];
            } else {
                mainContent.innerHTML = `<p>Seção não encontrada.</p>`;
            }
        }

        const links = document.querySelectorAll('nav a');
        links.forEach(link => {
            link.addEventListener('click', function(event) {
                event.preventDefault();
                const secao = this.getAttribute('data-section');
                if (secao) {
                    carregarSecao(secao);
                }
            });
        });

        carregarSecao('sobre');
    </script>
</body>
</html>
